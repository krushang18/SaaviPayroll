databases:
  - name: saavi-payroll-db
    databaseName: saavi_payroll
    user: saavi_user
    plan: free

services:
  - type: web
    name: saavi-payroll-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: saavi-payroll-db
          property: connectionString
