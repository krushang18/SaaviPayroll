[build]
  publish = "frontend"

# Production: Netlify proxies /api/* → Render backend (no CORS issues)
# Local dev: frontend JS auto-detects localhost and calls http://localhost:8000 directly
[[redirects]]
  from = "/api/*"
  to = "https://saavi-payroll-api.onrender.com/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
