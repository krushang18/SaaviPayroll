[build]
  publish = "frontend"

# Proxy /api/* to the Render backend — update the URL after deploying to Render
[[redirects]]
  from = "/api/*"
  to = "https://saavi-payroll-api.onrender.com/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
